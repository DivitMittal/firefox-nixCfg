name: firefox-nixcfg
version: 1.0.0
description: Declarative Firefox configuration home-manager module with Betterfox, CSS hacks, and fx-autoconfig
author: DivitMittal
license: MIT
target: all
type: instructions

dependencies:
  mcp:
    - name: serena
      registry: false
      transport: stdio
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project
        - ~/Projects/Cfgs/firefox-nixCfg/
    - name: nixos
      registry: false
      transport: stdio
      command: uvx
      args:
        - mcp-nixos
